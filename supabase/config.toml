# Configuración de las Edge Functions de Guardalia
project_id = "ylwxsawiixvtjttsogzu"

# El checkout lo llama la guardería con la anon key → requiere JWT (por defecto).
[functions.crear-checkout]
verify_jwt = true

# El alta de trials la llama la landing con la anon key → requiere JWT.
[functions.crear-trial]
verify_jwt = true

# El webhook lo llama Stripe (sin JWT) → debe ir sin verificación de JWT.
# La seguridad la da la firma de Stripe (STRIPE_WEBHOOK_SECRET).
[functions.stripe-webhook]
verify_jwt = false

# Campaña de prospección: la disparas tú (cron/curl). La protege CAMPANA_SECRET.
[functions.enviar-campana]
verify_jwt = false

# Baja/unsubscribe: enlace público desde el email.
[functions.baja]
verify_jwt = false

# Borrado de clientes desde el panel: protegido por PANEL_SECRET (cabecera).
[functions.borrar-cliente]
verify_jwt = false
